# SonarQube project configuration for CircleGuard (multi-module Gradle).
#
# Pipelines pasan estos overrides:
#   sonar-scanner -Dsonar.host.url=... -Dsonar.login=... -Dsonar.projectVersion=...

sonar.projectKey=circleguard
sonar.projectName=CircleGuard
sonar.organization=circleguard

sonar.sourceEncoding=UTF-8

# Multi-module: cada microservicio es un sub-modulo Sonar
sonar.modules=auth,identity,form,promotion,notification,gateway,dashboard,file

auth.sonar.projectBaseDir=services/circleguard-auth-service
auth.sonar.sources=src/main/java
auth.sonar.tests=src/test/java
auth.sonar.java.binaries=build/classes/java/main
auth.sonar.junit.reportPaths=build/test-results/test,build/test-results/integrationTest
auth.sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

identity.sonar.projectBaseDir=services/circleguard-identity-service
identity.sonar.sources=src/main/java
identity.sonar.tests=src/test/java
identity.sonar.java.binaries=build/classes/java/main
identity.sonar.junit.reportPaths=build/test-results/test,build/test-results/integrationTest
identity.sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

