notification.sonar.tests=src/test/java
notification.sonar.java.binaries=build/classes/java/main
notification.sonar.junit.reportPaths=build/test-results/test,build/test-results/integrationTest
notification.sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

gateway.sonar.projectBaseDir=services/circleguard-gateway-service
