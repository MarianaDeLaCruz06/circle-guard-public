spring:
  application:
    name: circleguard-auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/circleguard_auth}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ldap:
    urls: ${SPRING_LDAP_URLS:ldap://localhost:389}
    base: ${SPRING_LDAP_BASE:dc=circleguard,dc=edu}
    username: ${SPRING_LDAP_USERNAME:cn=admin,dc=circleguard,dc=edu}
    password: ${SPRING_LDAP_PASSWORD:admin}

jwt:
  secret: ${JWT_SECRET:my-super-secret-dev-key-32-chars-long-12345678}
  expiration: ${JWT_EXPIRATION:3600000}

qr:
  secret: ${QR_SECRET:my-qr-secret-key-for-dev-1234567890}
  expiration: ${QR_EXPIRATION:300}

server:
  port: 8180

circleguard:
  identity-service:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8083}

resilience4j:
  circuitbreaker:
    instances:
      identityService:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      identityService:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, retries
  health:
    circuitbreakers:
      enabled: true
